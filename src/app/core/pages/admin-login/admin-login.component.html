<div class="min-h-screen bg-slate-950 text-slate-100 font-['Plus_Jakarta_Sans']">
  <div class="relative overflow-hidden">
    <div class="absolute -top-40 right-0 h-72 w-72 rounded-full bg-rose-500/20 blur-3xl"></div>
    <div class="absolute -bottom-40 left-0 h-72 w-72 rounded-full bg-amber-400/10 blur-3xl"></div>

    <div class="relative mx-auto flex min-h-screen max-w-md items-center px-5 py-10">
      <div class="w-full rounded-3xl border border-white/10 bg-slate-900/70 p-6 shadow-[0_20px_60px_-35px_rgba(0,0,0,0.9)]">
        <p class="text-xs uppercase tracking-[0.35em] text-rose-300/80">Panel Admin</p>
        <h1 class="mt-2 text-3xl font-semibold text-white font-['Space_Grotesk']">Iniciar sesión</h1>
        <p class="mt-2 text-sm text-slate-300">Acceso exclusivo para administración.</p>

        <form (ngSubmit)="onSubmit()" class="mt-6 grid gap-4">
          <label class="text-xs uppercase tracking-wider text-slate-400">
            Usuario
            <input
              [(ngModel)]="username"
              name="username"
              class="mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-rose-300/50 focus:ring-2 focus:ring-rose-300/30"
              placeholder="Usuario"
              autocomplete="username"
            />
          </label>
          <label class="text-xs uppercase tracking-wider text-slate-400">
            Contraseña
            <input
              [(ngModel)]="password"
              name="password"
              type="password"
              class="mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-rose-300/50 focus:ring-2 focus:ring-rose-300/30"
              placeholder="Contraseña"
              autocomplete="current-password"
            />
          </label>

          <p *ngIf="errorMessage" class="rounded-2xl border border-rose-400/40 bg-rose-500/10 px-4 py-2 text-sm text-rose-200">
            {{ errorMessage }}
          </p>

          <button
            type="submit"
            [disabled]="isLoading"
            class="rounded-full bg-rose-400 px-5 py-2 text-sm font-semibold text-rose-950 shadow-lg shadow-rose-500/30 transition hover:bg-rose-300 disabled:cursor-not-allowed disabled:bg-rose-400/40"
          >
            {{ isLoading ? 'Validando…' : 'Entrar' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
