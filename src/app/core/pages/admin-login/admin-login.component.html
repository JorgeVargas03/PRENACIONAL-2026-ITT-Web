<div class="min-h-screen bg-slate-950 text-slate-100 font-['Plus_Jakarta_Sans']">
  <div class="relative overflow-hidden">
    <div class="absolute -top-40 right-0 h-72 w-72 rounded-full bg-rose-500/20 blur-3xl"></div>
    <div class="absolute -bottom-40 left-0 h-72 w-72 rounded-full bg-amber-400/10 blur-3xl"></div>

    <div class="relative mx-auto flex min-h-screen max-w-md items-center px-5 py-12">
      <div class="w-full rounded-[28px] border border-white/10 bg-gradient-to-b from-slate-900/80 via-slate-900/70 to-slate-950/80 p-6 shadow-[0_24px_70px_-40px_rgba(0,0,0,0.95)]">
        <div class="flex items-center justify-between">
          <span class="rounded-full border border-rose-400/30 bg-rose-500/10 px-3 py-1 text-[10px] font-semibold uppercase tracking-[0.35em] text-rose-200">
            Acceso admin
          </span>
          <span class="rounded-full border border-emerald-400/30 bg-emerald-500/10 px-3 py-1 text-xs text-emerald-200">
            Seguro
          </span>
        </div>

        <h1 class="mt-5 text-3xl font-semibold text-white font-['Space_Grotesk']">Iniciar sesión</h1>
        <p class="mt-2 text-sm text-slate-300">Acceso exclusivo para administración.</p>

        <div class="mt-6 rounded-2xl border border-white/10 bg-white/5 p-4">
          <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Panel de control</p>
          <p class="mt-2 text-sm text-slate-300">
            Ingresa tus credenciales para administrar los participantes y el mapa en vivo.
          </p>
        </div>

        <form (ngSubmit)="onSubmit()" class="mt-6 grid gap-4">
          <label class="text-xs uppercase tracking-wider text-slate-400">
            Usuario
            <input
              [(ngModel)]="username"
              name="username"
              class="admin-login-field mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-rose-300/50 focus:ring-2 focus:ring-rose-300/30"
              placeholder="Usuario"
              autocomplete="username"
            />
          </label>
          <label class="text-xs uppercase tracking-wider text-slate-400">
            Contraseña
            <input
              [(ngModel)]="password"
              name="password"
              type="password"
              class="admin-login-field mt-2 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition focus:border-rose-300/50 focus:ring-2 focus:ring-rose-300/30"
              placeholder="Contraseña"
              autocomplete="current-password"
            />
          </label>

          <p *ngIf="errorMessage" class="rounded-2xl border border-rose-400/40 bg-rose-500/10 px-4 py-2 text-sm text-rose-200">
            {{ errorMessage }}
          </p>

          <button
            type="submit"
            [disabled]="isLoading"
            class="mt-2 rounded-full bg-rose-400 px-5 py-2 text-sm font-semibold text-rose-950 shadow-lg shadow-rose-500/30 transition hover:bg-rose-300 disabled:cursor-not-allowed disabled:bg-rose-400/40"
          >
            {{ isLoading ? 'Validando…' : 'Entrar' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
